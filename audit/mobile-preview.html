<!doctype html>
<html><head><meta charset="utf-8"><title>Mobile preview</title>
<style>
  body { margin:0; background:#1a1a1a; font-family:system-ui; color:#eee; padding:24px; display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .phone { width:390px; height:844px; border-radius:36px; border:8px solid #0a0a0a; overflow:hidden; box-shadow:0 40px 80px rgba(0,0,0,0.5); position:relative; background:#F5F2EC; }
  .phone iframe { width:100%; height:100%; border:0; display:block; }
  .label { text-align:center; margin-top:12px; font-size:13px; color:#888; }
  .col { display:flex; flex-direction:column; align-items:center; }
  h1 { width:100%; text-align:center; font-weight:400; margin:0 0 8px; font-size:18px; }
  .sub { width:100%; text-align:center; font-size:12px; color:#888; margin-bottom:24px; }
</style></head>
<body>
  <h1>Hadyński — mobile preview</h1>
  <div class="sub">iPhone 14 (390×844). Scroll wewnątrz każdej ramki.</div>
  <div class="col">
    <div class="phone"><iframe src="../Hadynski.html#v1"></iframe></div>
    <div class="label">Wariant: obecny (Editorial)</div>
  </div>
  <div class="col">
    <div class="phone"><iframe src="../Hadynski.html#v4" id="f4"></iframe></div>
    <div class="label">Wariant 4 — Modern UI</div>
  </div>
<script>
  // Switch second frame to v4 after load
  window.addEventListener('load', () => {
    setTimeout(() => {
      const f = document.getElementById('f4');
      try {
        const btn = f.contentDocument.querySelector('#hero-switcher button[data-variant="v4"]');
        if (btn) btn.click();
      } catch(e) {}
    }, 1500);
  });
</script>
</body></html>
